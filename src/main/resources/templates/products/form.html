<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${isEdit} ? 'Cập nhật sản phẩm' : 'Thêm mới sản phẩm'">Sản phẩm</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container py-4">
    <h3 class="mb-4" th:text="${isEdit} ? 'Cập nhật sản phẩm' : 'Thêm mới sản phẩm'"></h3>

    <form
            th:action="${isEdit} ? @{/products/{id}/edit(id=${product.id}, page=${page}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})} : @{/products/create}"
            th:object="${product}"
            method="post"
            novalidate
    >
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="productName">Tên sản phẩm</label>
            <input
                    id="productName"
                    type="text"
                    class="form-control"
                    th:field="*{productName}"
                    placeholder="Nhập tên sản phẩm"
            >
            <div class="text-danger" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></div>
        </div>

        <div class="form-group">
            <label for="category">Danh mục</label>
            <select id="category" class="form-control" th:field="*{category}">
                <option value="" disabled th:selected="${product.category == null}">-- Chọn danh mục --</option>
                <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
        </div>

        <div class="form-group">
            <label for="price">Giá (VNĐ)</label>
            <input
                    id="price"
                    type="number"
                    class="form-control"
                    min="0.01"
                    step="0.01"
                    th:field="*{price}"
                    placeholder="Nhập giá"
            >
            <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="form-group">
            <label for="stock">Tồn kho</label>
            <input
                    id="stock"
                    type="number"
                    class="form-control"
                    min="0"
                    step="1"
                    th:field="*{stock}"
                    placeholder="Nhập số lượng tồn"
            >
            <div class="text-danger" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
        </div>

        <div class="form-group">
            <label for="description">Mô tả</label>
            <textarea
                    id="description"
                    class="form-control"
                    rows="4"
                    maxlength="500"
                    th:field="*{description}"
                    placeholder="Mô tả (không bắt buộc)"
            ></textarea>
            <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Lưu thay đổi' : 'Tạo mới'">Lưu</button>
        <a
                class="btn btn-secondary ml-2"
                th:href="${isEdit} ? @{/products(page=${page}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})} : @{/products}"
        >
            Quay lại
        </a>
    </form>
</div>
</body>
</html>
